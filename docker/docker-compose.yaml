version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: event_dashboard_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - eventsdata:/var/lib/postgresql/data

volumes:
  eventsdata:
